<div class="wrap">
  <form class="card" [formGroup]="loginForm" (submit)="doLogin($event)">
    <h1>{{ appTitle }}</h1>
    @if (error) {
      <p class="err">{{ error }}</p>
    }
    <label>Username</label>
    <input type="text" formControlName="username">
    <label>Password</label>
    <input type="password" formControlName="password">
    <button type="submit" [disabled]="loading || loginForm.invalid">{{ loading ? 'Accesso...' : 'Accedi' }}</button>
  </form>
</div>
